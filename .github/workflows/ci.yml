name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: django
          POSTGRES_PASSWORD: django
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m venv env
          source env/bin/activate
          pip install -r backend/requirements.txt

      - name: Run migrations and tests
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DB_NAME: test_db
          DB_USER: django
          DB_PASSWORD: django
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          source env/bin/activate
          cd backend
          python manage.py migrate
          python manage.py test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Chromium and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxrandr2 \
            libasound2 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libgbm1 \
            libgtk-3-0

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests with Karma
        run: |
          cd frontend
          npm run test -- --watch=false --browsers=ChromeHeadless
        env:
          CHROME_BIN: /usr/bin/google-chrome
          CI: 'true'
