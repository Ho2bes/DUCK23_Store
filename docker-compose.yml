version: "3.8"

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: 'Nicolas1990'
      POSTGRES_USER: 'hobbes'
      POSTGRES_DB: 'duck23_store_db'
    ports:
      - "5432:5432"
    # --- AJOUT : Volume pour ne jamais perdre les données ---
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hobbes -d duck23_store_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    depends_on:
      - db
    image: adminer
    restart: always
    ports:
      - 8080:8080

  api:
    image: django-api
    build:
      context: ./backend
      dockerfile: python.Dockerfile
    volumes:
      - ./backend:/backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_NAME: 'duck23_store_db'
      DB_USER: 'hobbes'
      DB_HOST: 'db'
      DB_PASSWORD: 'Nicolas1990'
      DB_PORT: '5432'
    depends_on:
      db:
        condition: service_healthy
    # --- MODIFICATION : Ajout du loaddata dans la commande de démarrage ---
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata initial_data.json || true &&
             python manage.py runserver 0.0.0.0:8000"

  front:
    build:
      context: ./frontend
      dockerfile: angular.Dockerfile
    restart: always
    ports:
      - "80:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules

# --- AJOUT : Déclaration du volume en bas du fichier ---
volumes:
  postgres_data:
