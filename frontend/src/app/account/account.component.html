<h2>Mon compte</h2>

<!-- ✅ Formulaire de mise à jour -->
<form (ngSubmit)="onSubmit(updateForm)" #updateForm="ngForm">
  <label for="first_name">Prénom :</label>
  <input type="text" name="first_name" [(ngModel)]="user.first_name" placeholder="Prénom" required>

  <label for="last_name">Nom :</label>
  <input type="text" name="last_name" [(ngModel)]="user.last_name" placeholder="Nom" required>

  <label for="address">Adresse :</label>
  <input type="text" name="address" [(ngModel)]="user.address" placeholder="Adresse">

  <label for="phone_number">Téléphone :</label>
  <input type="text" name="phone_number" [(ngModel)]="user.phone_number" placeholder="Téléphone">

  <button type="submit" [disabled]="updateForm.invalid">Mettre à jour</button>
</form>

<!-- ✅ Message de confirmation -->
<p *ngIf="message" class="success-message">{{ message }}</p>

<!-- ✅ Boutons actions -->
<button (click)="modifyPassword()">Modifier mon mot de passe</button>
<button (click)="modifyDetails()">Modifier mes informations</button>
<button (click)="logout()">Me déconnecter</button>
<button (click)="deleteAccount()">Supprimer mon compte</button>
