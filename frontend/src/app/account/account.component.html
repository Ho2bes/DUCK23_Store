<div class="account-container">
	<h2>Voici ton compte</h2>
	<p><strong>Identifiant:</strong> {{ user?.username }}</p>
	<p><strong>Email:</strong> {{ user?.email }}</p>

	<button (click)="modifyPassword()">Modifier mon mot de passe</button>
	<button (click)="modifyDetails()">Modifier mes informations</button>
	<button (click)="logout()">Me déconnecter</button>
	<button (click)="deleteAccount()">Supprimer mon compte</button>
  </div>
