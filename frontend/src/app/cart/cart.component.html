<div class="container mt-5">
	<h2 class="text-center mb-4">🛒 Mon panier</h2>

	<table class="table">
	  <thead>
		<tr>
		  <th>Produit</th>
		  <th>Prix</th>
		  <th>Quantité</th>
		  <th>Total</th>
		  <th>Action</th>
		</tr>
	  </thead>
	  <tbody>
		<tr *ngFor="let item of cart">
		  <td>{{ item.product.name }}</td>
		  <td>{{ item.product.price }} €</td>
		  <td>
			<input type="number" [(ngModel)]="item.quantity" (change)="updateQuantity(item.id, item.quantity)" min="1" class="form-control w-25">
		  </td>
		  <td>{{ item.product.price * item.quantity }} €</td>
		  <td>
			<button class="btn btn-danger btn-sm" (click)="removeItem(item.id)">❌</button>
		  </td>
		</tr>
	  </tbody>
	</table>

	<div class="text-end">
	  <h4>Total : {{ getTotal() }} €</h4>
	  <button class="btn btn-primary">Passer la commande</button>
	</div>
  </div>
