<section class="container my-5">
    <h2 class="text-center">Mon Panier</h2>

    <table class="table table-bordered mt-4">
        <thead class="table-light">
            <tr>
                <th>Produit</th>
                <th>Prix</th>
                <th>Quantité</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of cart">
                <td>{{ item.product.name }}</td>
                <td>{{ item.product.price }} €</td>
                <td>
                    <input type="number" [(ngModel)]="item.quantity" (change)="updateQuantity(item.id, item.quantity)" min="1" class="form-control" style="width: 70px;">
                </td>
                <td>{{ item.product.price * item.quantity }} €</td>
                <td>
                    <button class="btn btn-danger btn-sm" (click)="removeItem(item.id)">❌</button>
                </td>
            </tr>
        </tbody>
    </table>

    <h4 class="text-end mt-3">Total : {{ getTotal() }} €</h4>
</section>
