<div class="modify-password-container">
	<h2>Modifier mon mot de passe</h2>
	<form (ngSubmit)="onSubmit($event)" #modifyPasswordForm="ngForm">
		<input type="password" name="newPassword" ngModel placeholder="Nouveau mot de passe" required>
	  <input type="password" name="confirmPassword" ngModel placeholder="Confirmer le mot de passe" required>
	  <button type="submit" [disabled]="modifyPasswordForm.invalid">Confirmer</button>
	</form>
  </div>
