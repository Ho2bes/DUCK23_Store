<h2>Connexion</h2>
<form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
  <input type="text" name="username" [(ngModel)]="username" placeholder="Ton nom d'utilisateur" required>
  <input type="password" name="password" [(ngModel)]="password" placeholder="Ton mot de passe" required>
  <button type="submit">Se connecter</button>
</form>
<p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
<p>Pas de compte ? <a routerLink="/register">Clique ici pour t'inscrire</a></p>
